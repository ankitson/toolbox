# External skill sources copied into skills/ by bin/skillctl sync.
# Any skill directory not listed here is custom and edited locally.

[skills.agent-browser]
repo = "vercel-labs/agent-browser"

[skills.agents-sdk]
repo = "cloudflare/skills"
path = "skills/agents-sdk"

[skills.anthropics]
repo = "anthropics/skills"
path = "skills/{claude-api,skill-creator}"

[skills.autoreview]
repo = "openclaw/agent-skills"
path = "skills/autoreview"

[skills.cloudflare]
repo = "cloudflare/skills"
path = "skills/cloudflare"

[skills.cloudflare-email-service]
repo = "cloudflare/skills"
path = "skills/cloudflare-email-service"

[skills.durable-objects]
repo = "cloudflare/skills"
path = "skills/durable-objects"

[skills.last30days]
repo = "mvanhorn/last30days-skill"
path = "skills/last30days"

[skills.mattpocock]
repo = "mattpocock/skills"
path = "skills/{productivity/grill-me,engineering/grill-with-docs,engineering/triage,engineering/zoom-out}"

[skills.qmd]
repo = "tobi/qmd"
path = "skills/qmd"

[skills.rdt-cli]
repo = "public-clis/rdt-cli"
files = ["SKILL.md", "SCHEMA.md"]

[skills.sandbox-sdk]
repo = "cloudflare/skills"
path = "skills/sandbox-sdk"

[skills.slavingia]
repo = "slavingia/skills"
path = "skills/*"

[skills.web-perf]
repo = "cloudflare/skills"
path = "skills/web-perf"

[skills.workers-best-practices]
repo = "cloudflare/skills"
path = "skills/workers-best-practices"

[skills.wrangler]
repo = "cloudflare/skills"
path = "skills/wrangler"
