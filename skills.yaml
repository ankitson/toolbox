# Skills manifest - sources to sync into ~/.agents/skills/
# Each entry is a GitHub repo with optional paths to specific skills.
# If no paths specified, all skills in the repo's skills/ directory are synced.

skills_dir: ~/.agents/skills

sources:
  # Official Anthropic skills (cherry-pick the ones you want)
  - repo: anthropics/skills
    ref: main
    skills:
      - claude-api
      - skill-creator

  # Community repos
  - repo: tobi/qmd
    ref: main
    skills:
      - qmd
